<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unilateral Strength & Longevity</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Lucide Icon Component Wrapper
        const Icon = ({ name, className, size = 20 }) => {
            const [iconNode, setIconNode] = useState(null);
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) setIconNode(icon);
                }
            }, [name]);
            if (!iconNode) return <div className={className} style={{ width: size, height: size }} />;
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: iconNode.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k,v]) => `${k}="${v}"`).join(' ')} />`).join('') }}
                />
            );
        };

        const apiKey = ""; // Set by runtime
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const WORKOUT_PLANS = [
          {
            id: 'A',
            title: 'Stability & Posture',
            focus: 'Shoulders, Back, Hips',
            exercises: [
              { name: 'Single-Arm Landmine Press', target: 'Shoulders/Arms', equipment: 'Landmine', sets: 3, reps: 18, instruction: 'Press from shoulder. Control descent.' },
              { name: 'Archer Ring Rows', target: 'Back/Arms', equipment: 'Rings', sets: 3, reps: 18, instruction: 'One arm rows, one stays straight.' },
              { name: 'Step-Downs', target: 'Legs/Hip Stability', equipment: 'Bodyweight', sets: 3, reps: 18, instruction: 'Slow eccentric control to floor.' },
              { name: 'Banded/KB Psoas March', target: 'Psoas/Hip Flexors', equipment: 'Kettlebell/Band', sets: 3, reps: 18, instruction: 'Drive knee to chest while lying down.' }
            ]
          },
          {
            id: 'B',
            title: 'Functional Power',
            focus: 'Legs, Hips, Arms',
            exercises: [
              { name: 'Single-Leg Landmine RDL', target: 'Hips/Hamstrings', equipment: 'Landmine', sets: 3, reps: 18, instruction: 'Hinge back with one leg extended.' },
              { name: 'Single-Arm Kettlebell Row', target: 'Back/Arms', equipment: 'Kettlebell', sets: 3, reps: 18, instruction: 'Support on bench, row to hip.' },
              { name: 'Suitcase Carry', target: 'Core/Hips', equipment: 'Dumbbell/KB', sets: 3, reps: '18 Steps', instruction: 'Walk upright with weight in one hand.' },
              { name: 'Single-Arm Landmine Lateral Raise', target: 'Shoulders', equipment: 'Landmine', sets: 3, reps: 18, instruction: 'Arc bar out to side for deltoid work.' }
            ]
          }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedWorkout, setSelectedWorkout] = useState(null);
            const [completedExercises, setCompletedExercises] = useState({});
            const [sessionWeights, setSessionWeights] = useState({});
            const [isWorkoutActive, setIsWorkoutActive] = useState(false);
            const [aiLoading, setAiLoading] = useState(null);
            const [aiInsight, setAiInsight] = useState(null);
            const [showAiModal, setShowAiModal] = useState(false);
            const [showSummaryModal, setShowSummaryModal] = useState(false);
            const [workoutSummary, setWorkoutSummary] = useState("");

            const callGemini = async (prompt, systemInstruction) => {
                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemInstruction }] }
                            })
                        });
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (err) {
                        if (i === 4) throw err;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                }
            };

            const getExerciseCues = async (exercise) => {
                setAiLoading(exercise.name);
                const weights = sessionWeights[exercise.name] || { L: '?', R: '?' };
                const prompt = `Explain in 3 sentences how ${exercise.name} (L: ${weights.L}lb, R: ${weights.R}lb) helps my left arm/right hip weakness. Give one neuromuscular cue.`;
                const sys = "You are a Physical Therapist specializing in longevity.";
                try {
                    const res = await callGemini(prompt, sys);
                    setAiInsight({ title: exercise.name, text: res });
                    setShowAiModal(true);
                } catch (e) { console.error(e); }
                setAiLoading(null);
            };

            const finishWorkout = async () => {
                setAiLoading('summary');
                const log = JSON.stringify(sessionWeights);
                const prompt = `User finished workout with weights: ${log}. Left arm/Right hip are weak sides. Give a 4-line longevity report on their symmetry gap.`;
                const sys = "Expert in geriatric kinesiology.";
                try {
                    const res = await callGemini(prompt, sys);
                    setWorkoutSummary(res);
                    setShowSummaryModal(true);
                } catch (e) { console.error(e); }
                setAiLoading(null);
            };

            return (
                <div className="max-w-md mx-auto p-4 pb-24 font-sans">
                    {!isWorkoutActive ? (
                        <div className="space-y-6">
                            <header className="bg-white p-6 rounded-3xl shadow-sm border">
                                <h1 className="text-2xl font-bold text-slate-800">Unilateral Strength</h1>
                                <div className="flex gap-2 mt-4 text-[10px] font-bold">
                                    <span className="bg-indigo-50 text-indigo-600 p-2 rounded-xl flex-1 border">LEFT ARM: WEAK</span>
                                    <span className="bg-rose-50 text-rose-600 p-2 rounded-xl flex-1 border">RIGHT HIP: WEAK</span>
                                </div>
                            </header>
                            {WORKOUT_PLANS.map(w => (
                                <div key={w.id} onClick={() => { setSelectedWorkout(w); setIsWorkoutActive(true); setSessionWeights({}); setCompletedExercises({}); }} className="bg-white p-6 rounded-3xl border shadow-sm cursor-pointer active:scale-95 transition-all">
                                    <span className="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full font-bold">WORKOUT {w.id}</span>
                                    <h2 className="text-xl font-bold mt-2">{w.title}</h2>
                                    <p className="text-slate-500 text-sm">{w.focus}</p>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <button onClick={() => setIsWorkoutActive(false)} className="text-slate-400 text-sm font-bold flex items-center">← Back</button>
                            <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-xl">
                                <h2 className="text-2xl font-bold">{selectedWorkout.title}</h2>
                                <p className="text-xs opacity-60 font-bold mt-2 uppercase tracking-widest">18 Rep Target</p>
                            </div>
                            {selectedWorkout.exercises.map((ex, i) => (
                                <div key={i} className={`bg-white p-6 rounded-[2rem] border-2 ${completedExercises[ex.name] ? 'border-emerald-400 bg-emerald-50/20' : 'border-slate-100'}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <h3 className="font-bold text-slate-800">{ex.name}</h3>
                                        <button onClick={() => setCompletedExercises(prev => ({...prev, [ex.name]: !prev[ex.name]}))} className={completedExercises[ex.name] ? "text-emerald-500" : "text-slate-100"}>
                                            <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" /></svg>
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <input type="number" placeholder="Left lb" className="bg-slate-50 p-3 rounded-xl border font-bold text-sm" onChange={e => setSessionWeights(p => ({...p, [ex.name]: {...p[ex.name], L: e.target.value}}))}/>
                                        <input type="number" placeholder="Right lb" className="bg-slate-50 p-3 rounded-xl border font-bold text-sm" onChange={e => setSessionWeights(p => ({...p, [ex.name]: {...p[ex.name], R: e.target.value}}))}/>
                                    </div>
                                    <button onClick={() => getExerciseCues(ex)} className="w-full py-3 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-700">
                                        {aiLoading === ex.name ? "Analyzing..." : "✨ AI Symmetry Cues"}
                                    </button>
                                </div>
                            ))}
                            <button onClick={finishWorkout} className="w-full py-5 bg-slate-900 text-white rounded-[2.5rem] font-bold shadow-2xl active:scale-95">
                                {aiLoading === 'summary' ? "Generating Report..." : "Complete & Analyze Gap"}
                            </button>
                        </div>
                    )}

                    {/* Modals */}
                    {showAiModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs relative">
                                <h3 className="font-bold text-lg mb-4 uppercase">{aiInsight.title}</h3>
                                <p className="text-sm text-slate-600 italic leading-relaxed">{aiInsight.text}</p>
                                <button onClick={() => setShowAiModal(false)} className="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Got it</button>
                            </div>
                        </div>
                    )}

                    {showSummaryModal && (
                        <div className="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[110] flex items-center justify-center p-6">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
                                <h2 className="text-2xl font-bold mb-4">Workout Complete!</h2>
                                <div className="bg-indigo-50 p-6 rounded-2xl text-left text-sm text-indigo-900 italic mb-6">
                                    {workoutSummary}
                                </div>
                                <button onClick={closeWorkout} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold">Exit Session</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
